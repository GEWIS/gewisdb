name: Check migrations and seed

# Runs whenever an entity, migration, or seeder changes. On a slim web + database stack it:
#  - applies the migrations + seed from the base branch up to the head branch (and back down again), and
#  - verifies every entity change has a matching migration committed (i.e. no schema drift).
# Mailman and Listmonk are sync-based and not needed to exercise migrations or seeders, so only the web +
# database containers are started.
on:
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
    paths:
      - '**/Model/**/*.php'
      - '**/migrations/*.php'
      - '**/test/Seeder/*.php'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  # Shared compose file set for the docker compose invocations below.
  COMPOSE_FILES: --file docker-compose.github.yml --file docker-compose.override.yml --file docker-compose.yml

jobs:
  migration_seed:
    name: Check migrations and seed
    runs-on: ubuntu-latest

    steps:
      - name: Echo
        run: echo "This job should only run if entities, migrations, or fixtures are updated"

      - name: Checkout base branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.base.ref }}

      - name: Copy .env
        run: cp .env.dist .env

      - name: setup docker buildx
        uses: docker/setup-buildx-action@v2

      # --no-deps keeps this lightweight: only web + the database start, not the
      # sync-based mail/list services that web otherwise depends on.
      - name: run base
        run: docker compose $COMPOSE_FILES up -d --build --no-deps --quiet-pull web postgresql

      - name: migrate base
        run: make migrate

      - name: get migration status
        run: |
          MIGRATION_BASE_DEFAULT=$(docker compose exec -u www-data -it web ./orm migrations:current --no-interaction --object-manager doctrine.entitymanager.orm_default | sed 's/\s-.*//' | sed 's/\s//')
          echo "Default is at: $MIGRATION_BASE_DEFAULT"
          echo "MIGRATION_BASE_DEFAULT=$MIGRATION_BASE_DEFAULT" >> $GITHUB_ENV
          MIGRATION_BASE_REPORT=$(docker compose exec -u www-data -it web ./orm migrations:current --no-interaction --object-manager doctrine.entitymanager.orm_report | sed 's/\s-.*//' | sed 's/\s//')
          echo "Report is at: $MIGRATION_BASE_REPORT"
          echo "MIGRATION_BASE_REPORT=$MIGRATION_BASE_REPORT" >> $GITHUB_ENV

      - name: seed base
        run: make seed-core

      - name: cleanup base
        run: docker compose $COMPOSE_FILES down

      - name: Checkout head branch
        uses: actions/checkout@v4

      - name: Copy .env
        run: cp .env.dist .env

      - name: run head
        run: docker compose $COMPOSE_FILES up -d --build --no-deps --quiet-pull web postgresql

      - name: migrate head
        run: make migrate

      - name: ensure migrations are up to date
        # Regenerate migrations from the current entities; any output here means an
        # entity changed without a matching migration being committed.
        run: |
          make migration-diff
          if [ -n "$(git status --porcelain | grep 'migrations/')" ]; then
            echo "::error::Entity changes detected without a matching migration. Run 'make migration-diff' locally and commit the generated migration(s)."
            git status --porcelain | grep 'migrations/'
            exit 1
          fi
          echo "All migrations are up to date."

      - name: seed head
        run: make seed-core

      - name: revert to base migration
        run: |
          docker compose exec -u www-data -it web ./orm migrations:migrate --no-interaction --object-manager doctrine.entitymanager.orm_default $MIGRATION_BASE_DEFAULT
          docker compose exec -u www-data -it web ./orm migrations:migrate --no-interaction --object-manager doctrine.entitymanager.orm_report $MIGRATION_BASE_REPORT

      - name: stop
        run: docker compose $COMPOSE_FILES down
